<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compte-rendu d'anesthésie – CHPG Monaco</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

<div class="app">

  <header class="topbar">
    <div class="brand">
      <div class="logo">CHPG</div>
      <div>
        <h1>Compte-rendu d'anesthésie – CHPG Monaco</h1>
        <p>Assistant de rédaction clinique</p>
      </div>
    </div>

    <button id="copyBtn" type="button">Copier le CR</button>
  </header>

  <main class="layout">

    <!-- GAUCHE -->
    <section class="panel left-panel">
      <div class="panel-title">Intervention</div>

      <div class="field">
        <label>Date</label>
        <input type="date" id="date">
      </div>

      <div class="field">
        <label>Anesthésiste</label>
        <select id="anesthesiste"></select>
      </div>

      <div class="field">
        <label>Spécialité</label>
        <select id="specialite"></select>
      </div>

      <div id="chirContainer"></div>
      <button class="action-btn" id="addChirBtn" type="button">+ Chirurgien</button>

      <div style="height:12px"></div>

      <div id="gesteContainer"></div>
      <button class="action-btn" id="addGesteBtn" type="button">+ Intervention</button>
    </section>

    <!-- MILIEU -->
    <section class="panel middle-panel">

      <div class="mini-card">
        <h3>Monitorage</h3>
        <div class="chip-zone" id="monitorage"></div>
        <div id="monitorageDetails"></div>
      </div>

      <div class="mini-card">
        <h3>Induction</h3>
        <div class="chip-zone" id="induction"></div>
      </div>

      <div class="mini-card">
        <h3>Curare</h3>
        <div class="chip-zone" id="curare"></div>
      </div>

      <div class="mini-card">
        <h3>Voies aériennes</h3>
        <div class="chip-zone" id="vaOptions"></div>
        <div id="vaDetails"></div>

        <div id="srBlock" class="hidden" style="margin-top:10px;">
          <label style="display:flex;align-items:center;gap:8px;">
            <input type="checkbox" id="sequenceRapide">
            Séquence rapide
          </label>
        </div>
      </div>

      <div class="mini-card">
        <h3>Entretien</h3>
        <div class="chip-zone" id="entretienOptions"></div>
      </div>

      <div class="mini-card hidden" id="alrCard">
        <h3>ALR</h3>
        <div class="chip-zone" id="alrOptions"></div>

        <div class="inline mt8">
          <select id="localAgent">
            <option>Ropivacaïne 0,2%</option>
            <option>Ropivacaïne 0,375%</option>
            <option>Ropivacaïne 0,5%</option>
          </select>
          <input type="number" id="localVolume" value="20" placeholder="mL">
        </div>
      </div>

      <div class="mini-card">
        <h3>Péri-opératoire</h3>

        <div class="field">
          <label>Diurèse (mL)</label>
          <input type="number" id="diurese" placeholder="0">
        </div>

        <div class="field">
          <label>Saignement (mL)</label>
          <input type="number" id="saignement" placeholder="0">
        </div>

        <div class="field">
          <label>Remplissage</label>
          <input type="text" id="remplissage" placeholder="ex : 1500 mL cristalloïdes">
        </div>

        <label style="display:flex;align-items:center;gap:8px;margin-top:10px;">
          <input type="checkbox" id="noradCheck">
          Noradrénaline
        </label>

        <div id="noradBlock" class="hidden" style="margin-top:8px;">
          <input type="text" id="noradText" placeholder="ex : max 0,08 µg/kg/min">
        </div>
      </div>

      <div class="mini-card">
        <h3>Antibioprophylaxie</h3>
        <div class="chip-zone" id="antibioOptions"></div>
      </div>

    </section>

    <!-- DROITE -->
    <section class="panel report-panel">
      <div class="panel-title">Compte-rendu généré</div>
      <textarea id="report"></textarea>
    </section>

  </main>
</div>

<script src="./data.js"></script>
<script src="./app.js"></script>

</body>
</html>
