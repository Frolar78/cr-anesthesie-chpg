<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compte-rendu d'anesthésie – CHPG Monaco</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

<div class="app">

<header class="topbar">
  <div class="brand">
    <div class="logo-shell">
      <img src="./logo-chpg.png" alt="CHPG" class="brand-logo">
    </div>

    <div class="brand-text">
      <h1>Compte-rendu d’anesthésie</h1>
      <p>Centre Hospitalier Princesse Grace • Monaco</p>
    </div>
  </div>

  <button id="copyBtn" type="button">Copier le CR</button>
</header>

  <main class="layout">

    <section class="panel left-panel">
      <div class="panel-title">Intervention</div>

      <div class="field">
        <label>Date</label>
        <input type="date" id="date">
      </div>

      <div class="field">
        <label>Anesthésiste</label>
        <select id="anesthesiste"></select>
      </div>

      <div class="field">
        <label>Spécialité</label>
        <select id="specialite"></select>
      </div>

      <div id="chirContainer"></div>
      <button class="action-btn" id="addChirBtn" type="button">+ Chirurgien</button>

      <div style="height:14px"></div>

      <div id="gesteContainer"></div>
      <button class="action-btn" id="addGesteBtn" type="button">+ Intervention</button>
    </section>

    <section class="panel middle-panel">

      <div class="mini-card">
  <h3>Monitorage</h3>
  <div class="chip-zone" id="monitorage"></div>
  <div id="monitorageDetails"></div>

  <div style="margin-top:10px;">
    <label>Position</label>
    <select id="positionPatient">
<option value="">Choisir...</option>
<option>Décubitus dorsal</option>
<option>Décubitus ventral</option>
<option>Décubitus latéral droit</option>
<option>Décubitus latéral gauche</option>
<option>Position assise</option>
    </select>
  </div>
</div>

      <div class="mini-card">
        <h3>Induction</h3>
        <div class="chip-zone" id="induction"></div>
      </div>

      <div class="mini-card">
        <h3>Curare</h3>
        <div class="chip-zone" id="curare"></div>
      </div>

      <div class="mini-card">
        <h3>Voies aériennes</h3>
        <div class="chip-zone" id="vaOptions"></div>
        <div id="vaDetails"></div>

        <div id="srBlock" class="hidden" style="margin-top:10px;">
          <label class="checkbox-row">
            <input type="checkbox" id="sequenceRapide">
            <span>Séquence rapide</span>
          </label>
        </div>

        <div id="ventilationBlock" class="hidden" style="margin-top:10px;">
          <label>Ventilation au masque</label>
          <div class="chip-zone" id="ventilationOptions"></div>
          <input
            type="text"
            id="ventilationPrecision"
            class="hidden"
            style="margin-top:8px;"
            placeholder="Précision ventilation..."
          >
        </div>
      </div>

      <div class="mini-card">
        <h3>Entretien</h3>
        <div class="chip-zone" id="entretienOptions"></div>
      </div>

      <div class="mini-card">
        <h3>Analgésie</h3>
        <div class="chip-zone" id="analgesieOptions"></div>
      </div>

      <div class="mini-card hidden" id="alrCard">
        <h3>ALR périphérique</h3>
        <div class="chip-zone" id="alrOptions"></div>

        <div class="inline mt8">
          <select id="localAgent">
            <option>Ropivacaïne 0,2%</option>
            <option>Ropivacaïne 0,375%</option>
            <option>Ropivacaïne 0,5%</option>
          </select>

          <input type="number" id="localVolume" value="20" placeholder="mL">
        </div>
      </div>

      <div class="mini-card hidden" id="neuraxialCard">
        <h3>ALR neuraxiale</h3>
        <div class="chip-zone" id="neuraxialOptions"></div>

        <div id="periduraleDetails" class="hidden mt8">
          <input
            type="text"
            id="periduraleNiveau"
            placeholder="Niveau de ponction, ex : T7-T8"
          >
        </div>
      </div>

      <button class="action-btn hidden" id="showPeropBtn" type="button">
        + Ajouter données per-opératoires
      </button>

      <div class="mini-card" id="peropCard">
        <h3>Per-opératoire</h3>

        <div class="field">
          <label>Diurèse (mL)</label>
          <input type="number" id="diurese" placeholder="Ex : 450">
        </div>

        <div class="field">
          <label>Saignement (mL)</label>
          <input type="number" id="saignement" placeholder="Ex : 200">
        </div>

        <div class="field">
          <label>Remplissage</label>
          <input type="text" id="remplissage" placeholder="Ex : 1500 mL cristalloïdes">
        </div>

        <label class="checkbox-row">
          <input type="checkbox" id="noradCheck">
          <span>Noradrénaline</span>
        </label>

        <div id="noradBlock" class="hidden" style="margin-top:10px;">
          <input type="text" id="noradText" placeholder="Ex : maximum 0,08 µg/kg/min">
        </div>

        <label class="checkbox-row">
          <input type="checkbox" id="incidentCheck">
          <span>Incident peropératoire</span>
        </label>

        <div id="incidentBlock" class="hidden" style="margin-top:10px;">
          <textarea id="incidentText" placeholder="Décrire l’incident..." style="height:80px;"></textarea>
        </div>
      </div>

      <div class="mini-card" id="antibioCard">
        <h3>Antibioprophylaxie</h3>
        <div class="chip-zone" id="antibioOptions"></div>

        <div id="antibioOtherBlock" class="hidden" style="margin-top:10px;">
          <input
            type="text"
            id="antibioOtherText"
            placeholder="Préciser l’antibioprophylaxie..."
          >
        </div>
      </div>

    </section>

    <section class="panel report-panel">
      <div class="panel-title">Compte-rendu généré</div>
      <textarea id="report"></textarea>
    </section>

  </main>
</div>

<script src="./data.js"></script>
<script src="./rules.js"></script>
<script src="./ui.js"></script>
<script src="./report.js"></script>
<script src="./app.js"></script>

</body>
</html>
